<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CompTIA Cloud+ Flashcards</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }
  .app { max-width: 700px; margin: 0 auto; padding: 20px; }
  h1 { font-size: 1.4rem; text-align: center; margin-bottom: 4px; color: #f1f5f9; }
  .subtitle { text-align: center; color: #64748b; font-size: 0.85rem; margin-bottom: 24px; }
  .cat-bar { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-bottom: 20px; }
  .cat-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid #334155; background: transparent; color: #94a3b8; font-size: 0.78rem; cursor: pointer; transition: all 0.2s; }
  .cat-btn:hover { border-color: #60a5fa; color: #60a5fa; }
  .cat-btn.active { background: #1e3a5f; border-color: #3b82f6; color: #93c5fd; }
  .progress-wrap { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .progress-bar { flex: 1; height: 6px; background: #1e293b; border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #8b5cf6); border-radius: 3px; transition: width 0.4s; }
  .progress-text { font-size: 0.8rem; color: #64748b; white-space: nowrap; }
  .card-container { perspective: 1000px; margin-bottom: 20px; }
  .card { position: relative; width: 100%; min-height: 220px; cursor: pointer; transition: transform 0.5s; transform-style: preserve-3d; }
  .card.flipped { transform: rotateY(180deg); }
  .card-face { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 16px; padding: 32px 28px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
  .card-front { background: linear-gradient(145deg, #1e293b, #162032); border: 1px solid #334155; }
  .card-back { background: linear-gradient(145deg, #1a2744, #152238); border: 1px solid #2d4a6f; transform: rotateY(180deg); }
  .card-cat { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px; color: #60a5fa; margin-bottom: 16px; font-weight: 600; }
  .card-question { font-size: 1.15rem; line-height: 1.5; color: #f1f5f9; }
  .card-answer { font-size: 1.2rem; line-height: 1.6; color: #a5f3fc; font-weight: 600; }
  .card-answer .acr-full { display: block; font-size: 0.85rem; color: #7dd3fc; font-weight: 400; margin-top: 6px; }
  .card-hint { font-size: 0.75rem; color: #475569; margin-top: 20px; }
  .conf-row { display: flex; gap: 10px; margin-bottom: 20px; }
  .conf-btn { flex: 1; padding: 12px; border-radius: 10px; border: none; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .conf-btn:hover { transform: translateY(-1px); }
  .conf-miss { background: #7f1d1d; color: #fca5a5; }
  .conf-miss:hover { background: #991b1b; }
  .conf-shaky { background: #78350f; color: #fcd34d; }
  .conf-shaky:hover { background: #92400e; }
  .conf-got { background: #14532d; color: #86efac; }
  .conf-got:hover { background: #166534; }
  .nav-row { display: flex; justify-content: space-between; align-items: center; }
  .nav-btn { padding: 10px 22px; border-radius: 10px; border: 1px solid #334155; background: #1e293b; color: #94a3b8; cursor: pointer; font-size: 0.85rem; transition: all 0.2s; }
  .nav-btn:hover { background: #334155; color: #e2e8f0; }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .shuffle-btn { padding: 10px 22px; border-radius: 10px; border: 1px solid #334155; background: transparent; color: #94a3b8; cursor: pointer; font-size: 0.85rem; }
  .shuffle-btn:hover { border-color: #8b5cf6; color: #a78bfa; }
  .stats { display: flex; justify-content: center; gap: 24px; margin-top: 24px; padding: 16px; background: #1e293b; border-radius: 12px; }
  .stat { text-align: center; }
  .stat-num { font-size: 1.3rem; font-weight: 700; }
  .stat-label { font-size: 0.7rem; color: #64748b; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
  .stat-miss .stat-num { color: #f87171; }
  .stat-shaky .stat-num { color: #fbbf24; }
  .stat-got .stat-num { color: #4ade80; }
  .stat-unseen .stat-num { color: #64748b; }
  .filter-mode { text-align: center; font-size: 0.78rem; color: #64748b; margin-bottom: 6px; }
  .empty-state { text-align: center; padding: 60px 20px; color: #64748b; }
  .empty-state p { margin-bottom: 12px; }
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
const CARDS = [

  // ========== DOMAIN 1: CLOUD ARCHITECTURE (23%) ==========
  { cat: "Architecture", q: "Cloud infrastructure owned and operated by a provider, available to any customer (AWS, Azure, GCP)", a: "Public cloud" },
  { cat: "Architecture", q: "Cloud infrastructure dedicated to a single organization — on-premises or hosted", a: "Private cloud" },
  { cat: "Architecture", q: "A combination of public and private cloud environments with data and applications moving between them", a: "Hybrid cloud" },
  { cat: "Architecture", q: "Using two or more public cloud providers to avoid vendor lock-in and optimize services", a: "Multi-cloud" },
  { cat: "Architecture", q: "Customer manages OS and apps; provider manages hardware, networking, and storage", a: "IaaS<span class='acr-full'>(Infrastructure as a Service)</span>" },
  { cat: "Architecture", q: "Customer manages apps and data; provider manages OS, middleware, and hardware", a: "PaaS<span class='acr-full'>(Platform as a Service)</span>" },
  { cat: "Architecture", q: "Provider manages everything; customer just uses the application (e.g., Gmail, Microsoft 365)", a: "SaaS<span class='acr-full'>(Software as a Service)</span>" },
  { cat: "Architecture", q: "Serverless model where code runs on demand in response to events with no server management (e.g., AWS Lambda)", a: "FaaS<span class='acr-full'>(Function as a Service)</span>" },
  { cat: "Architecture", q: "The division of security duties between cloud provider and customer — provider secures infrastructure, customer secures their data and configs", a: "Shared responsibility model" },
  { cat: "Architecture", q: "Security OF the cloud vs Security IN the cloud — what do these represent?", a: "Provider's responsibility vs Customer's responsibility" },
  { cat: "Architecture", q: "The tendency of applications to be drawn toward large datasets because moving data is expensive and slow", a: "Data gravity" },
  { cat: "Architecture", q: "Over-dependence on a specific cloud provider's proprietary services making migration difficult and costly", a: "Vendor lock-in" },
  { cat: "Architecture", q: "One or more discrete data centers with redundant power, networking, and cooling within a cloud region", a: "Availability Zone (AZ)" },
  { cat: "Architecture", q: "A geographic area containing multiple availability zones — resources are isolated from other regions", a: "Cloud region" },
  { cat: "Architecture", q: "Increasing capacity of an existing instance — more CPU, RAM, or storage on the same server", a: "Vertical scaling (scaling up)" },
  { cat: "Architecture", q: "Adding more instances to distribute load across multiple servers", a: "Horizontal scaling (scaling out)" },
  { cat: "Architecture", q: "Automatically adding or removing instances based on predefined metrics like CPU usage or request rate", a: "Autoscaling" },
  { cat: "Architecture", q: "Designed to minimize downtime using redundancy — vs DR which restores operations after a major failure", a: "High Availability (HA)" },
  { cat: "Architecture", q: "Maximum acceptable data loss measured in time — how old can the most recent backup be?", a: "RPO<span class='acr-full'>(Recovery Point Objective)</span>" },
  { cat: "Architecture", q: "Maximum acceptable downtime before systems must be restored", a: "RTO<span class='acr-full'>(Recovery Time Objective)</span>" },
  { cat: "Architecture", q: "Both sites handle live traffic simultaneously — vs active/passive where one is on standby", a: "Active/active configuration" },
  { cat: "Architecture", q: "Distributes cached static content to edge servers closer to end users to reduce latency", a: "CDN<span class='acr-full'>(Content Delivery Network)</span>" },
  { cat: "Architecture", q: "Stores frequently accessed data in fast memory (Redis, Memcached) to reduce database load", a: "Caching layer" },
  { cat: "Architecture", q: "Match instance to workload, commit for discount, or bid for spare capacity — three cloud cost strategies", a: "Right-sizing, Reserved instances, Spot/Preemptible instances" },
  { cat: "Architecture", q: "Reports cloud costs to teams without billing them — vs chargeback which actually bills teams", a: "Showback" },
  { cat: "Architecture", q: "Attaching metadata key-value pairs to resources for tracking costs by team, project, or environment", a: "Resource tagging" },
  { cat: "Architecture", q: "Decomposing an application into small, independently deployable services communicating over APIs", a: "Microservices architecture" },
  { cat: "Architecture", q: "A single application where all components are tightly coupled and deployed as one unit", a: "Monolithic architecture" },
  { cat: "Architecture", q: "Infrastructure layer handling service-to-service communication — provides load balancing, mTLS, and observability (Istio, Linkerd)", a: "Service mesh" },
  { cat: "Architecture", q: "Managed service acting as a front door for APIs — handles routing, auth, rate limiting, SSL termination", a: "API gateway" },
  { cat: "Architecture", q: "Asynchronous decoupled communication — producer sends messages, consumer processes them independently (AWS SQS, Azure Service Bus)", a: "Message queue" },
  { cat: "Architecture", q: "Systems communicate by publishing and subscribing to events rather than direct API calls", a: "Event-driven architecture" },
  { cat: "Architecture", q: "Time to complete a single request — vs throughput which is requests processed per second", a: "Latency" },
  { cat: "Architecture", q: "Using public cloud capacity to handle overflow when on-premises resources are exhausted", a: "Cloud bursting" },
  { cat: "Architecture", q: "DR tiers from cheapest/slowest to most expensive/fastest", a: "Backup & Restore → Pilot Light → Warm Standby → Multi-site Active/Active" },
  { cat: "Architecture", q: "Legal requirement that data remain within specific geographic boundaries — affects cloud region selection", a: "Data sovereignty" },
  { cat: "Architecture", q: "The charge for data leaving a cloud provider or region — often the most significant hidden cloud cost", a: "Egress cost" },

  // ========== DOMAIN 2: DEPLOYMENT (19%) ==========
  { cat: "Deployment", q: "Isolated private network within a public cloud where you control IP ranges, subnets, routing, and access", a: "VPC<span class='acr-full'>(Virtual Private Cloud)</span>" },
  { cat: "Deployment", q: "Public subnets have internet access; private subnets do not — what are these divisions called?", a: "Subnets" },
  { cat: "Deployment", q: "A virtual stateful firewall controlling inbound and outbound traffic at the instance level", a: "Security group" },
  { cat: "Deployment", q: "A stateless subnet-level firewall that processes rules in number order", a: "NACL<span class='acr-full'>(Network Access Control List)</span>" },
  { cat: "Deployment", q: "Stateful and applies to instances — vs stateless which applies to subnets", a: "Security group vs NACL" },
  { cat: "Deployment", q: "Allows private subnet resources to initiate outbound internet connections without exposing them to inbound traffic", a: "NAT gateway<span class='acr-full'>(Network Address Translation)</span>" },
  { cat: "Deployment", q: "A VPC component that enables communication between instances in public subnets and the internet", a: "Internet gateway" },
  { cat: "Deployment", q: "A private network connection between two VPCs allowing resources to communicate as if on the same network", a: "VPC peering" },
  { cat: "Deployment", q: "A cloud network hub that connects multiple VPCs and on-premises networks through a single gateway", a: "Transit gateway" },
  { cat: "Deployment", q: "A dedicated private network connection from on-premises to cloud — lower latency than VPN (AWS = Direct Connect, Azure = ExpressRoute)", a: "Direct Connect / ExpressRoute" },
  { cat: "Deployment", q: "Routes traffic based on TCP/UDP port and IP address — faster but less intelligent than layer 7", a: "Layer 4 load balancer" },
  { cat: "Deployment", q: "Routes traffic based on HTTP content — URL path, headers, cookies — enables blue/green deployments", a: "Layer 7 load balancer" },
  { cat: "Deployment", q: "Low-latency raw storage presented to instances as a virtual disk — used for OS volumes and databases (AWS EBS, Azure Managed Disks)", a: "Block storage" },
  { cat: "Deployment", q: "Flat storage for unstructured data accessed via HTTP APIs — highly scalable, not mountable as a drive (AWS S3, Azure Blob)", a: "Object storage" },
  { cat: "Deployment", q: "Shared filesystem accessible by multiple instances simultaneously via NFS or SMB (AWS EFS, Azure Files)", a: "File storage" },
  { cat: "Deployment", q: "Hot, Cool/Warm, Cold/Archive — what are these called?", a: "Storage tiers<span class='acr-full'>(Classified by access frequency and cost)</span>" },
  { cat: "Deployment", q: "Defining and provisioning infrastructure through code rather than manual processes", a: "IaC<span class='acr-full'>(Infrastructure as Code)</span>" },
  { cat: "Deployment", q: "Running the same IaC template multiple times produces the same result — no duplicate resources", a: "Idempotency" },
  { cat: "Deployment", q: "Open-source IaC tool using declarative HCL to provision infrastructure across multiple cloud providers", a: "Terraform" },
  { cat: "Deployment", q: "Provider-native IaC tools for AWS, Azure, and GCP respectively", a: "CloudFormation, ARM Templates/Bicep, Cloud Deployment Manager" },
  { cat: "Deployment", q: "A pre-built, hardened machine image used as the base for launching new instances", a: "Golden image / Golden AMI" },
  { cat: "Deployment", q: "A lightweight isolated runtime that packages an application and its dependencies — shares the host OS kernel", a: "Container" },
  { cat: "Deployment", q: "The leading container runtime and image format — uses Dockerfile to define images", a: "Docker" },
  { cat: "Deployment", q: "Open-source container orchestration platform for automating deployment, scaling, and management of containers", a: "Kubernetes (K8s)" },
  { cat: "Deployment", q: "Running code without managing servers — provider auto-scales and charges per invocation (AWS Lambda, Azure Functions)", a: "Serverless computing" },
  { cat: "Deployment", q: "Two identical environments — blue is live, green is new — switch traffic after validation for easy rollback", a: "Blue/green deployment" },
  { cat: "Deployment", q: "Gradually routing a small percentage of traffic to the new version before full rollout", a: "Canary deployment" },
  { cat: "Deployment", q: "Replacing old instances with new ones gradually — reduces downtime but slower rollback", a: "Rolling deployment" },
  { cat: "Deployment", q: "A set of rules determining where network traffic is directed from each subnet", a: "Route table" },
  { cat: "Deployment", q: "A static public IPv4 address you can allocate and reassign to cloud instances — persists across stops and starts", a: "Elastic IP" },
  { cat: "Deployment", q: "An IPSec encrypted tunnel connecting on-premises networks to a cloud VPC over the public internet", a: "Site-to-site VPN" },
  { cat: "Deployment", q: "The smallest Kubernetes deployable unit — one or more containers sharing a network namespace and storage", a: "Pod" },
  { cat: "Deployment", q: "A Kubernetes declarative spec for managing replica sets of pods — handles rolling updates and rollbacks", a: "Deployment (Kubernetes)" },
  { cat: "Deployment", q: "A Kubernetes abstraction providing a stable network endpoint to a set of pods", a: "Service (Kubernetes)" },
  { cat: "Deployment", q: "A virtual cluster within a Kubernetes cluster — isolates resources between teams or environments", a: "Namespace (Kubernetes)" },
  { cat: "Deployment", q: "A Kubernetes package manager that uses charts to deploy and manage complex applications", a: "Helm" },
  { cat: "Deployment", q: "Cloud-managed Kubernetes control plane — AWS, Azure, and GCP offerings respectively", a: "EKS, AKS, GKE" },
  { cat: "Deployment", q: "Keeping multiple versions of a stored object to protect against accidental deletion or overwrite", a: "Object storage versioning" },
  { cat: "Deployment", q: "Automated rules transitioning objects between storage tiers or deleting them after a set time", a: "Storage lifecycle policy" },
  { cat: "Deployment", q: "Lift-and-shift, Re-platform, Refactor — what are these called?", a: "Application migration strategies" },

  // ========== DOMAIN 3: SECURITY (19%) ==========
  { cat: "Security", q: "Controls who can do what with which cloud resources", a: "IAM<span class='acr-full'>(Identity and Access Management)</span>" },
  { cat: "Security", q: "Grant only the minimum permissions needed — avoid wildcard permissions and over-privileged roles", a: "Principle of least privilege" },
  { cat: "Security", q: "A set of permissions attached to a cloud identity or service — temporary credentials, no long-term passwords or keys", a: "IAM role" },
  { cat: "Security", q: "A document defining allowed or denied actions on cloud resources — attached to users, groups, or roles", a: "IAM policy" },
  { cat: "Security", q: "Required for privileged accounts — especially root/admin accounts — in cloud environments", a: "MFA<span class='acr-full'>(Multi-Factor Authentication)</span>" },
  { cat: "Security", q: "A non-human identity used by applications and services to authenticate and access cloud resources", a: "Service principal / service account" },
  { cat: "Security", q: "Cloud service for creating, storing, and rotating encryption keys (AWS KMS, Azure Key Vault)", a: "KMS<span class='acr-full'>(Key Management Service)</span>" },
  { cat: "Security", q: "Data is encrypted when stored on disk — server-side encryption or customer-managed keys", a: "Encryption at rest" },
  { cat: "Security", q: "Data is encrypted while moving between services — enforce TLS and HTTPS-only endpoints", a: "Encryption in transit" },
  { cat: "Security", q: "An encryption key controlled by the customer, not the cloud provider", a: "CMK<span class='acr-full'>(Customer-Managed Key)</span>" },
  { cat: "Security", q: "Periodically replacing encryption keys to limit exposure window if a key is compromised", a: "Key rotation" },
  { cat: "Security", q: "Inspects and filters HTTP/HTTPS traffic to protect against SQLi, XSS, and OWASP Top 10", a: "WAF<span class='acr-full'>(Web Application Firewall)</span>" },
  { cat: "Security", q: "Managed service absorbing volumetric attacks at the network edge (AWS Shield, Azure DDoS Protection)", a: "Cloud DDoS protection" },
  { cat: "Security", q: "A network interface connecting a cloud service to a VPC using a private IP — traffic never traverses the public internet", a: "Private endpoint" },
  { cat: "Security", q: "Continuously assesses cloud configurations for misconfigurations and compliance violations", a: "CSPM<span class='acr-full'>(Cloud Security Posture Management)</span>" },
  { cat: "Security", q: "Secures VMs, containers, and serverless functions against runtime threats", a: "CWPP<span class='acr-full'>(Cloud Workload Protection Platform)</span>" },
  { cat: "Security", q: "Unified platform combining CSPM, CWPP, and shift-left security", a: "CNAPP<span class='acr-full'>(Cloud-Native Application Protection Platform)</span>" },
  { cat: "Security", q: "A minimum set of security configurations all cloud resources must meet — often based on CIS Benchmarks", a: "Security baseline" },
  { cat: "Security", q: "An object storage bucket with public read/write access — one of the most common cloud misconfigurations", a: "Open/public S3 bucket" },
  { cat: "Security", q: "Records all API calls and user actions — AWS CloudTrail, Azure Activity Log, GCP Cloud Audit Logs", a: "Cloud audit logging" },
  { cat: "Security", q: "Securely storing and accessing credentials, API keys, and certificates — never hard-code these in code", a: "Secrets management<span class='acr-full'>(AWS Secrets Manager, Azure Key Vault, HashiCorp Vault)</span>" },
  { cat: "Security", q: "Using an external identity provider for authentication rather than creating separate cloud accounts (SAML, OIDC)", a: "Federated identity" },
  { cat: "Security", q: "Replacing sensitive data with a non-sensitive token — real data stored in a separate secure vault", a: "Tokenization" },
  { cat: "Security", q: "AWS Organizations policy that sets permission guardrails across all accounts — overrides account-level IAM", a: "SCP<span class='acr-full'>(Service Control Policy)</span>" },
  { cat: "Security", q: "Periodic review of IAM permissions to ensure least privilege — removes unused roles and stale access", a: "Cloud access review" },
  { cat: "Security", q: "Scanning IaC templates for misconfigurations before deployment (Checkov, tfsec, cfn-nag)", a: "IaC security scanning" },
  { cat: "Security", q: "Prescriptive set of configuration recommendations for cloud services (CIS AWS Foundations Benchmark)", a: "Cloud security benchmark" },
  { cat: "Security", q: "Permissions assigned to roles, roles assigned to users or services", a: "RBAC<span class='acr-full'>(Role-Based Access Control)</span>" },
  { cat: "Security", q: "Access decisions based on tags or attributes of the identity and resource", a: "ABAC<span class='acr-full'>(Attribute-Based Access Control)</span>" },

  // ========== DOMAIN 4: OPERATIONS (17%) ==========
  { cat: "Operations", q: "Collecting metrics, logs, and traces to observe health and performance of cloud resources", a: "Cloud monitoring" },
  { cat: "Operations", q: "A contract between provider and customer defining uptime guarantees, support response times, and remedies for breach", a: "SLA<span class='acr-full'>(Service Level Agreement)</span>" },
  { cat: "Operations", q: "An internal target for availability or performance — typically more stringent than the SLA", a: "SLO<span class='acr-full'>(Service Level Objective)</span>" },
  { cat: "Operations", q: "A specific measurable metric used to evaluate whether an SLO is being met (e.g., request latency, error rate)", a: "SLI<span class='acr-full'>(Service Level Indicator)</span>" },
  { cat: "Operations", q: "The allowed downtime or error rate within an SLO period — when exhausted, new deployments pause", a: "Error budget" },
  { cat: "Operations", q: "Metrics, Logs, and Traces — what are these three called collectively?", a: "The three pillars of observability" },
  { cat: "Operations", q: "Tracking a request as it flows through multiple microservices to identify latency and failure points", a: "Distributed tracing" },
  { cat: "Operations", q: "When cloud resource configurations diverge from their defined baseline over time", a: "Configuration drift" },
  { cat: "Operations", q: "Applying OS and software updates to cloud instances — automated via AWS Systems Manager, Azure Update Manager", a: "Patch management" },
  { cat: "Operations", q: "Monitoring, analyzing, and optimizing cloud spending (AWS Cost Explorer, Azure Cost Management)", a: "Cloud cost management" },
  { cat: "Operations", q: "A commitment to use a specific instance type for 1 or 3 years in exchange for discounts up to 75%", a: "Reserved instance" },
  { cat: "Operations", q: "Spare cloud capacity at steep discounts — can be terminated by the provider with short notice", a: "Spot / Preemptible instance" },
  { cat: "Operations", q: "Matching instance types and sizes to actual workload requirements to avoid over-provisioning", a: "Rightsizing" },
  { cat: "Operations", q: "Tracks all cloud assets, their configurations, and relationships for change and incident management", a: "CMDB<span class='acr-full'>(Configuration Management Database)</span>" },
  { cat: "Operations", q: "A point-in-time copy of a block storage volume — used for backups, creating images, and cloning", a: "Snapshot" },
  { cat: "Operations", q: "Copying data to another cloud region for disaster recovery and geographic redundancy", a: "Cross-region replication" },
  { cat: "Operations", q: "Identifying differences between actual cloud state and the desired IaC state", a: "Infrastructure drift detection" },
  { cat: "Operations", q: "An automated alert when cloud costs spike unexpectedly — catches runaway resources or misconfigs", a: "Cloud spend anomaly alert" },
  { cat: "Operations", q: "A scheduled period for applying patches and changes — minimizes impact during planned downtime", a: "Maintenance window" },
  { cat: "Operations", q: "Defining how long logs must be stored before deletion — driven by compliance (PCI DSS = 1 year, HIPAA = 6 years)", a: "Log retention policy" },
  { cat: "Operations", q: "Forecasting future resource needs to ensure performance without over-provisioning", a: "Capacity planning" },
  { cat: "Operations", q: "Step-by-step documentation for performing operational tasks — used by on-call engineers to resolve incidents", a: "Runbook" },
  { cat: "Operations", q: "Average time a system operates before failing — higher value indicates more reliable infrastructure", a: "MTBF<span class='acr-full'>(Mean Time Between Failures)</span>" },

  // ========== DOMAIN 5: DEVOPS FUNDAMENTALS (10%) ==========
  { cat: "DevOps", q: "Automated pipelines that build, test, and deploy code on every commit", a: "CI/CD<span class='acr-full'>(Continuous Integration / Continuous Deployment)</span>" },
  { cat: "DevOps", q: "Automatically building and testing code every time a developer commits to the shared repository", a: "Continuous Integration" },
  { cat: "DevOps", q: "Automatically deploying every code change that passes tests to production without manual approval", a: "Continuous Deployment" },
  { cat: "DevOps", q: "Code passes tests and is ready for production but requires a manual approval gate before deploying", a: "Continuous Delivery" },
  { cat: "DevOps", q: "Jenkins, GitHub Actions, GitLab CI, AWS CodePipeline — what are these examples of?", a: "CI/CD pipeline tools" },
  { cat: "DevOps", q: "Using Git as the single source of truth for infrastructure — changes made via pull requests and automatically reconciled", a: "GitOps" },
  { cat: "DevOps", q: "A repository for storing and distributing Docker container images (Docker Hub, AWS ECR, Azure Container Registry)", a: "Container registry" },
  { cat: "DevOps", q: "Analyzing container images for known CVEs before deployment — integrated as a CI/CD security gate", a: "Image scanning" },
  { cat: "DevOps", q: "Integrating security testing earlier in the development lifecycle — finding vulnerabilities in dev, not after deployment", a: "Shift-left security" },
  { cat: "DevOps", q: "Analyzes source code without executing it to find security vulnerabilities", a: "SAST<span class='acr-full'>(Static Application Security Testing)</span>" },
  { cat: "DevOps", q: "Tests a running application by sending requests to find vulnerabilities", a: "DAST<span class='acr-full'>(Dynamic Application Security Testing)</span>" },
  { cat: "DevOps", q: "Storage system for build outputs like compiled binaries and packages (Nexus, Artifactory, AWS CodeArtifact)", a: "Artifact repository" },
  { cat: "DevOps", q: "Agentless configuration management tool using SSH and YAML playbooks to configure cloud instances", a: "Ansible" },
  { cat: "DevOps", q: "Source, Build, Test, Staging Deploy, Production Deploy — what are these called?", a: "CI/CD pipeline stages" },
  { cat: "DevOps", q: "Instant rollback capability — if the new version fails, route traffic back to the previous version immediately", a: "Blue/green deployment benefit" },
  { cat: "DevOps", q: "Enabling or disabling features at runtime without deploying new code — test for specific users before full rollout", a: "Feature flagging" },
  { cat: "DevOps", q: "Servers are never modified after deployment — new images are built and deployed, eliminating configuration drift", a: "Immutable infrastructure" },
  { cat: "DevOps", q: "A text file with instructions to build a Docker image — defines base image, dependencies, commands, and entry point", a: "Dockerfile" },
  { cat: "DevOps", q: "Applies software engineering practices to operations — emphasizes SLOs, error budgets, and automation", a: "SRE<span class='acr-full'>(Site Reliability Engineering)</span>" },

  // ========== DOMAIN 6: TROUBLESHOOTING (12%) ==========
  { cat: "Troubleshooting", q: "A cloud instance has no internet connectivity — what five things do you check?", a: "Internet gateway attached, public IP assigned, route table has 0.0.0.0/0 to IGW, security group allows outbound, NACL allows traffic" },
  { cat: "Troubleshooting", q: "Two instances in different subnets cannot communicate — what do you check?", a: "Route tables between subnets, security group inbound rules on destination, NACL rules on both subnets" },
  { cat: "Troubleshooting", q: "A load balancer returns 502 errors — what does this indicate?", a: "Bad gateway — backend returned an invalid response; check app logs and instance health" },
  { cat: "Troubleshooting", q: "A load balancer returns 504 errors — what does this indicate?", a: "Gateway timeout — backend did not respond in time; check response times and instance health" },
  { cat: "Troubleshooting", q: "Application is slow during peak hours but fine otherwise — likely cause?", a: "Insufficient capacity — autoscaling not scaling fast enough or instance type undersized; check CPU/memory metrics" },
  { cat: "Troubleshooting", q: "A deployment fails with a permissions error — what do you check?", a: "IAM role/policy attached to the deploying identity — verify required permissions for the target resource and region" },
  { cat: "Troubleshooting", q: "Cloud storage costs are unexpectedly high — what do you investigate?", a: "Unused snapshots, old object versions, wrong storage tier, data transfer/egress charges, orphaned volumes" },
  { cat: "Troubleshooting", q: "An instance fails health checks — what are common causes?", a: "Application not running, wrong port in health check config, security group blocking health check source IP, disk full" },
  { cat: "Troubleshooting", q: "Autoscaling is not triggering despite high CPU — what do you check?", a: "Scaling policy thresholds, CloudWatch metric delays, cooldown period active, max instance limit reached" },
  { cat: "Troubleshooting", q: "A TLS certificate error on a cloud endpoint — what do you check?", a: "Certificate expiry, domain name mismatch, certificate not trusted (self-signed), SNI configuration" },
  { cat: "Troubleshooting", q: "DNS resolution fails for a new cloud resource — what do you check?", a: "DNS record created correctly, propagation time (up to 48h for public), private hosted zone associated with correct VPC" },
  { cat: "Troubleshooting", q: "An S3 bucket returns 403 Forbidden — what do you check?", a: "Bucket policy, IAM policy permissions, block public access settings, object ACLs, encryption key permissions" },
  { cat: "Troubleshooting", q: "A container pod in Kubernetes keeps crashing — what is CrashLoopBackOff and what do you check?", a: "Container repeatedly failing to start — check kubectl logs, resource limits, app startup errors, missing env vars or secrets" },
  { cat: "Troubleshooting", q: "Captures metadata about accepted and rejected traffic in a VPC — equivalent to NetFlow for cloud networks", a: "VPC Flow Logs" },
  { cat: "Troubleshooting", q: "What is the cloud troubleshooting methodology?", a: "Identify the problem, check metrics and logs, test the theory, implement fix, verify functionality, document findings" },
  { cat: "Troubleshooting", q: "An instance cannot reach another instance in a peered VPC — what do you check?", a: "Route tables in both VPCs must point to the peer CIDR, security groups must allow traffic, no overlapping CIDR ranges" },
  { cat: "Troubleshooting", q: "A cloud function times out frequently — what do you investigate?", a: "Timeout setting too low, downstream service slow, cold start latency, insufficient memory, or infinite loop in code" },
  { cat: "Troubleshooting", q: "CloudWatch shows no metrics for a resource — what do you check?", a: "Monitoring agent installed and running, IAM permissions for agent role, correct namespace/metric filter, resource is running" },
  { cat: "Troubleshooting", q: "IaC deployment fails with a state conflict — what do you do?", a: "Check for state file lock, inspect state with terraform state commands, reconcile carefully — never delete state" },

];

let deck = [...CARDS];
let idx = 0;
let flipped = false;
let filter = "All";
let scores = {};

function getFiltered() {
  if (filter === "All") return [...CARDS];
  if (filter === "Missed") return CARDS.filter(c => scores[c.q] === "miss");
  if (filter === "Shaky") return CARDS.filter(c => scores[c.q] === "shaky");
  return CARDS.filter(c => c.cat === filter);
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function doShuffle() { deck = shuffle(getFiltered()); idx = 0; flipped = false; render(); }
function setFilter(f) { filter = f; deck = getFiltered(); idx = 0; flipped = false; render(); }
function flipCard() { flipped = !flipped; render(); }
function prev() { if (idx > 0) { idx--; flipped = false; render(); } }
function next() { if (idx < deck.length - 1) { idx++; flipped = false; render(); } }

function score(level) {
  if (deck.length === 0) return;
  scores[deck[idx].q] = level;
  if (idx < deck.length - 1) { idx++; flipped = false; }
  render();
}

function getStats() {
  let miss = 0, shaky = 0, got = 0, unseen = 0;
  CARDS.forEach(c => {
    const s = scores[c.q];
    if (s === "miss") miss++; else if (s === "shaky") shaky++; else if (s === "got") got++; else unseen++;
  });
  return { miss, shaky, got, unseen };
}

const cats = ["All", ...new Set(CARDS.map(c => c.cat)), "Missed", "Shaky"];

function render() {
  const app = document.getElementById("app");
  const stats = getStats();
  const total = deck.length;
  const progress = total > 0 ? ((idx + 1) / total * 100) : 0;
  const card = deck[idx];

  let catBtns = cats.map(c =>
    `<button class="cat-btn ${filter === c ? 'active' : ''}" onclick="setFilter('${c}')">${c}${c === "Missed" ? ` (${stats.miss})` : c === "Shaky" ? ` (${stats.shaky})` : ''}</button>`
  ).join('');

  let cardHTML = '';
  if (!card) {
    cardHTML = `<div class="empty-state"><p>No cards in this category yet.</p><p>Study more and mark cards to see them here!</p></div>`;
  } else {
    cardHTML = `
      <div class="card-container">
        <div class="card ${flipped ? 'flipped' : ''}" onclick="flipCard()">
          <div class="card-face card-front">
            <div class="card-cat">${card.cat}</div>
            <div class="card-question">${card.q}</div>
            <div class="card-hint">tap to reveal</div>
          </div>
          <div class="card-face card-back">
            <div class="card-cat">Answer</div>
            <div class="card-answer">${card.a}</div>
          </div>
        </div>
      </div>
      <div class="conf-row">
        <button class="conf-btn conf-miss" onclick="score('miss')">Missed</button>
        <button class="conf-btn conf-shaky" onclick="score('shaky')">Shaky</button>
        <button class="conf-btn conf-got" onclick="score('got')">Got it</button>
      </div>`;
  }

  app.innerHTML = `
    <h1>Cloud+ Flashcards</h1>
    <div class="subtitle">CV0-004 · ${CARDS.length} cards · one question, one answer</div>
    <div class="cat-bar">${catBtns}</div>
    ${total > 0 ? `
    <div class="filter-mode">${filter !== "All" && filter !== "Missed" && filter !== "Shaky" ? filter + ' · ' : ''}${idx + 1} of ${total}</div>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
      <div class="progress-text">${Math.round(progress)}%</div>
    </div>` : ''}
    ${cardHTML}
    ${card ? `
    <div class="nav-row">
      <button class="nav-btn" onclick="prev()" ${idx === 0 ? 'disabled' : ''}>← Prev</button>
      <button class="shuffle-btn" onclick="doShuffle()">Shuffle</button>
      <button class="nav-btn" onclick="next()" ${idx >= total - 1 ? 'disabled' : ''}>Next →</button>
    </div>` : ''}
    <div class="stats">
      <div class="stat stat-miss"><div class="stat-num">${stats.miss}</div><div class="stat-label">Missed</div></div>
      <div class="stat stat-shaky"><div class="stat-num">${stats.shaky}</div><div class="stat-label">Shaky</div></div>
      <div class="stat stat-got"><div class="stat-num">${stats.got}</div><div class="stat-label">Got It</div></div>
      <div class="stat stat-unseen"><div class="stat-num">${stats.unseen}</div><div class="stat-label">Unseen</div></div>
    </div>`;
}

doShuffle();
</script>
</body>
</html>
