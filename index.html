<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CompTIA Cloud+ Flashcards</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }
  .app { max-width: 700px; margin: 0 auto; padding: 20px; }
  h1 { font-size: 1.4rem; text-align: center; margin-bottom: 4px; color: #f1f5f9; }
  .subtitle { text-align: center; color: #64748b; font-size: 0.85rem; margin-bottom: 24px; }
  .cat-bar { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-bottom: 20px; }
  .cat-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid #334155; background: transparent; color: #94a3b8; font-size: 0.78rem; cursor: pointer; transition: all 0.2s; }
  .cat-btn:hover { border-color: #60a5fa; color: #60a5fa; }
  .cat-btn.active { background: #1e3a5f; border-color: #3b82f6; color: #93c5fd; }
  .progress-wrap { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .progress-bar { flex: 1; height: 6px; background: #1e293b; border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #8b5cf6); border-radius: 3px; transition: width 0.4s; }
  .progress-text { font-size: 0.8rem; color: #64748b; white-space: nowrap; }
  .card-container { perspective: 1000px; margin-bottom: 20px; }
  .card { position: relative; width: 100%; min-height: 220px; cursor: pointer; transition: transform 0.5s; transform-style: preserve-3d; }
  .card.flipped { transform: rotateY(180deg); }
  .card-face { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 16px; padding: 32px 28px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
  .card-front { background: linear-gradient(145deg, #1e293b, #162032); border: 1px solid #334155; }
  .card-back { background: linear-gradient(145deg, #1a2744, #152238); border: 1px solid #2d4a6f; transform: rotateY(180deg); }
  .card-cat { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px; color: #60a5fa; margin-bottom: 16px; font-weight: 600; }
  .card-question { font-size: 1.15rem; line-height: 1.5; color: #f1f5f9; }
  .card-answer { font-size: 1.2rem; line-height: 1.6; color: #a5f3fc; font-weight: 600; }
  .card-answer .acr-full { display: block; font-size: 0.85rem; color: #7dd3fc; font-weight: 400; margin-top: 6px; }
  .card-hint { font-size: 0.75rem; color: #475569; margin-top: 20px; }
  .conf-row { display: flex; gap: 10px; margin-bottom: 20px; }
  .conf-btn { flex: 1; padding: 12px; border-radius: 10px; border: none; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .conf-btn:hover { transform: translateY(-1px); }
  .conf-miss { background: #7f1d1d; color: #fca5a5; }
  .conf-miss:hover { background: #991b1b; }
  .conf-shaky { background: #78350f; color: #fcd34d; }
  .conf-shaky:hover { background: #92400e; }
  .conf-got { background: #14532d; color: #86efac; }
  .conf-got:hover { background: #166534; }
  .nav-row { display: flex; justify-content: space-between; align-items: center; }
  .nav-btn { padding: 10px 22px; border-radius: 10px; border: 1px solid #334155; background: #1e293b; color: #94a3b8; cursor: pointer; font-size: 0.85rem; transition: all 0.2s; }
  .nav-btn:hover { background: #334155; color: #e2e8f0; }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .shuffle-btn { padding: 10px 22px; border-radius: 10px; border: 1px solid #334155; background: transparent; color: #94a3b8; cursor: pointer; font-size: 0.85rem; }
  .shuffle-btn:hover { border-color: #8b5cf6; color: #a78bfa; }
  .stats { display: flex; justify-content: center; gap: 24px; margin-top: 24px; padding: 16px; background: #1e293b; border-radius: 12px; }
  .stat { text-align: center; }
  .stat-num { font-size: 1.3rem; font-weight: 700; }
  .stat-label { font-size: 0.7rem; color: #64748b; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
  .stat-miss .stat-num { color: #f87171; }
  .stat-shaky .stat-num { color: #fbbf24; }
  .stat-got .stat-num { color: #4ade80; }
  .stat-unseen .stat-num { color: #64748b; }
  .filter-mode { text-align: center; font-size: 0.78rem; color: #64748b; margin-bottom: 6px; }
  .empty-state { text-align: center; padding: 60px 20px; color: #64748b; }
  .empty-state p { margin-bottom: 12px; }
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
const CARDS = [

  // ========== DOMAIN 1: CLOUD ARCHITECTURE (23%) ==========
  { cat: "Architecture", q: "What is a public cloud?", a: "Cloud infrastructure owned and operated by a provider, available to any customer<span class='acr-full'>(Examples: AWS, Azure, Google Cloud)</span>" },
  { cat: "Architecture", q: "What is a private cloud?", a: "Cloud infrastructure dedicated to a single organization — on-premises or hosted" },
  { cat: "Architecture", q: "What is a hybrid cloud?", a: "A combination of public and private cloud environments with data and applications moving between them" },
  { cat: "Architecture", q: "What is multi-cloud?", a: "Using two or more public cloud providers to avoid vendor lock-in and optimize for best-of-breed services" },
  { cat: "Architecture", q: "What is IaaS?", a: "IaaS<span class='acr-full'>(Infrastructure as a Service — customer manages OS and apps; provider manages hardware, networking, storage)</span>" },
  { cat: "Architecture", q: "What is PaaS?", a: "PaaS<span class='acr-full'>(Platform as a Service — customer manages apps and data; provider manages OS, middleware, and hardware)</span>" },
  { cat: "Architecture", q: "What is SaaS?", a: "SaaS<span class='acr-full'>(Software as a Service — provider manages everything; customer just uses the application)</span>" },
  { cat: "Architecture", q: "What is FaaS?", a: "FaaS<span class='acr-full'>(Function as a Service — serverless; code runs on demand in response to events, no server management. Example: AWS Lambda)</span>" },
  { cat: "Architecture", q: "What is the shared responsibility model?", a: "Division of security duties between the cloud provider and the customer — provider secures infrastructure, customer secures their data and configurations" },
  { cat: "Architecture", q: "What are the two dimensions of the shared responsibility model?", a: "Security OF the cloud (provider's responsibility) vs Security IN the cloud (customer's responsibility)" },
  { cat: "Architecture", q: "What is data gravity?", a: "The tendency of applications and services to be drawn toward large datasets because moving data is expensive and slow" },
  { cat: "Architecture", q: "What is vendor lock-in?", a: "Over-dependence on a specific cloud provider's proprietary services making migration difficult and costly" },
  { cat: "Architecture", q: "What is an availability zone?", a: "AZ<span class='acr-full'>(Availability Zone — one or more discrete data centers with redundant power, networking, and cooling within a region)</span>" },
  { cat: "Architecture", q: "What is a cloud region?", a: "A geographic area containing multiple availability zones — resources deployed in a region are isolated from other regions" },
  { cat: "Architecture", q: "What is vertical scaling?", a: "Increasing the capacity of an existing instance — adding more CPU, RAM, or storage to the same server" },
  { cat: "Architecture", q: "What is horizontal scaling?", a: "Adding more instances to distribute load across multiple servers" },
  { cat: "Architecture", q: "What is autoscaling?", a: "Automatically adding or removing instances based on predefined metrics like CPU usage, queue depth, or request rate" },
  { cat: "Architecture", q: "What is HA vs DR?", a: "HA<span class='acr-full'>(High Availability — designed to minimize downtime using redundancy. DR = Disaster Recovery — restoring operations after a major failure)</span>" },
  { cat: "Architecture", q: "What is RPO?", a: "RPO<span class='acr-full'>(Recovery Point Objective — maximum acceptable data loss measured in time)</span>" },
  { cat: "Architecture", q: "What is RTO?", a: "RTO<span class='acr-full'>(Recovery Time Objective — maximum acceptable downtime before systems must be restored)</span>" },
  { cat: "Architecture", q: "What is active/active vs active/passive?", a: "Active/active: both sites handle live traffic simultaneously. Active/passive: one site is live, the other is on standby" },
  { cat: "Architecture", q: "What is a CDN?", a: "CDN<span class='acr-full'>(Content Delivery Network — distributes cached static content to edge servers closer to end users to reduce latency)</span>" },
  { cat: "Architecture", q: "What is a caching layer and why use it?", a: "Stores frequently accessed data in fast memory (Redis, Memcached) to reduce database load and improve response times" },
  { cat: "Architecture", q: "What are the three cloud cost optimization strategies?", a: "Right-sizing (match instance to workload), Reserved instances (commit for discount), Spot/Preemptible instances (bid for spare capacity at low cost)" },
  { cat: "Architecture", q: "What is showback vs chargeback?", a: "Showback = reports cloud costs to teams without billing them. Chargeback = bills teams for their actual cloud usage" },
  { cat: "Architecture", q: "What is resource tagging in cloud cost management?", a: "Attaching metadata key-value pairs to resources for tracking costs by team, project, environment, or application" },
  { cat: "Architecture", q: "What is a microservices architecture?", a: "Decomposing an application into small, independently deployable services that communicate over APIs" },
  { cat: "Architecture", q: "What is a monolithic architecture?", a: "A single application where all components are tightly coupled and deployed as one unit — harder to scale and update" },

  // ========== DOMAIN 2: DEPLOYMENT (19%) ==========
  { cat: "Deployment", q: "What is a VPC?", a: "VPC<span class='acr-full'>(Virtual Private Cloud — isolated private network within a public cloud where you control IP ranges, subnets, routing, and access)</span>" },
  { cat: "Deployment", q: "What is a subnet in cloud networking?", a: "A range of IP addresses within a VPC — public subnets have internet access, private subnets do not" },
  { cat: "Deployment", q: "What is a security group?", a: "A virtual firewall controlling inbound and outbound traffic at the instance level — stateful" },
  { cat: "Deployment", q: "What is a NACL?", a: "NACL<span class='acr-full'>(Network Access Control List — subnet-level firewall; stateless, processes rules in number order)</span>" },
  { cat: "Deployment", q: "What is the difference between a security group and a NACL?", a: "Security groups are stateful and apply to instances; NACLs are stateless and apply to subnets" },
  { cat: "Deployment", q: "What is a NAT gateway?", a: "NAT<span class='acr-full'>(Network Address Translation — allows private subnet resources to initiate outbound internet connections without exposing them to inbound traffic)</span>" },
  { cat: "Deployment", q: "What is an internet gateway?", a: "A VPC component that enables communication between instances in public subnets and the internet" },
  { cat: "Deployment", q: "What is VPC peering?", a: "A private network connection between two VPCs allowing resources to communicate as if on the same network" },
  { cat: "Deployment", q: "What is a transit gateway?", a: "A cloud network hub that connects multiple VPCs and on-premises networks through a single gateway" },
  { cat: "Deployment", q: "What is Direct Connect / ExpressRoute?", a: "Dedicated private network connections from on-premises to a cloud provider — lower latency and more consistent than VPN over internet<span class='acr-full'>(Direct Connect = AWS, ExpressRoute = Azure)</span>" },
  { cat: "Deployment", q: "What is a layer 4 load balancer?", a: "Routes traffic based on TCP/UDP port and IP address — faster but less intelligent than layer 7" },
  { cat: "Deployment", q: "What is a layer 7 load balancer?", a: "Routes traffic based on HTTP content — URL path, headers, cookies — enables advanced routing like blue/green deployments" },
  { cat: "Deployment", q: "What is block storage?", a: "Low-latency raw storage presented to instances as a virtual disk<span class='acr-full'>(Examples: AWS EBS, Azure Managed Disks — used for OS volumes and databases)</span>" },
  { cat: "Deployment", q: "What is object storage?", a: "Flat storage for unstructured data accessed via HTTP APIs — highly scalable, cheap, not mountable as a drive<span class='acr-full'>(Examples: AWS S3, Azure Blob Storage)</span>" },
  { cat: "Deployment", q: "What is file storage in the cloud?", a: "Shared filesystem accessible by multiple instances simultaneously via NFS or SMB<span class='acr-full'>(Examples: AWS EFS, Azure Files)</span>" },
  { cat: "Deployment", q: "What are storage tiers?", a: "Classes of storage with different performance and cost tradeoffs: Hot (frequent access), Cool/Warm (infrequent), Cold/Archive (rare access)" },
  { cat: "Deployment", q: "What is IaC?", a: "IaC<span class='acr-full'>(Infrastructure as Code — defining and provisioning infrastructure through code rather than manual processes)</span>" },
  { cat: "Deployment", q: "What is idempotency in IaC?", a: "Running the same IaC template multiple times produces the same result — no duplicate resources or configuration drift" },
  { cat: "Deployment", q: "What is Terraform?", a: "An open-source IaC tool using declarative HCL to provision infrastructure across multiple cloud providers" },
  { cat: "Deployment", q: "What are provider-native IaC tools?", a: "AWS CloudFormation (YAML/JSON), Azure ARM Templates / Bicep, Google Cloud Deployment Manager" },
  { cat: "Deployment", q: "What is a golden image / golden AMI?", a: "A pre-built, hardened machine image used as the base for launching new instances — contains OS, configs, and approved software" },
  { cat: "Deployment", q: "What is a container?", a: "A lightweight, isolated runtime that packages an application and its dependencies — shares the host OS kernel" },
  { cat: "Deployment", q: "What is Docker?", a: "The leading container runtime and image format — uses Dockerfile to define images, runs containers on a host" },
  { cat: "Deployment", q: "What is Kubernetes?", a: "K8s<span class='acr-full'>(Kubernetes — open-source container orchestration platform for automating deployment, scaling, and management of containers)</span>" },
  { cat: "Deployment", q: "What is serverless computing?", a: "Running code without managing servers — the provider auto-scales and charges per invocation<span class='acr-full'>(Examples: AWS Lambda, Azure Functions)</span>" },
  { cat: "Deployment", q: "What is a blue/green deployment?", a: "Running two identical environments (blue=live, green=new) and switching traffic to green after validation — easy rollback" },
  { cat: "Deployment", q: "What is a canary deployment?", a: "Gradually routing a small percentage of traffic to the new version before rolling it out to all users" },
  { cat: "Deployment", q: "What is a rolling deployment?", a: "Replacing old instances with new ones gradually — reduces downtime but slower rollback" },

  // ========== DOMAIN 3: SECURITY (19%) ==========
  { cat: "Security", q: "What is IAM in cloud security?", a: "IAM<span class='acr-full'>(Identity and Access Management — controls who can do what with which cloud resources)</span>" },
  { cat: "Security", q: "What is the principle of least privilege in cloud IAM?", a: "Grant only the minimum permissions needed to perform a task — avoid wildcard permissions and over-privileged roles" },
  { cat: "Security", q: "What is an IAM role?", a: "A set of permissions attached to a cloud identity or service — temporary credentials, no long-term passwords or keys" },
  { cat: "Security", q: "What is an IAM policy?", a: "A document defining allowed or denied actions on cloud resources, attached to users, groups, or roles" },
  { cat: "Security", q: "What is MFA in cloud environments?", a: "MFA<span class='acr-full'>(Multi-Factor Authentication — required for privileged accounts, especially root/admin accounts)</span>" },
  { cat: "Security", q: "What is a service principal / service account?", a: "A non-human identity used by applications and services to authenticate and access cloud resources" },
  { cat: "Security", q: "What is KMS?", a: "KMS<span class='acr-full'>(Key Management Service — cloud service for creating, storing, and rotating encryption keys. Examples: AWS KMS, Azure Key Vault)</span>" },
  { cat: "Security", q: "What is encryption at rest in the cloud?", a: "Data is encrypted when stored on disk — cloud services offer server-side encryption (provider manages keys) or customer-managed keys (CMK)" },
  { cat: "Security", q: "What is encryption in transit?", a: "Data is encrypted while moving between services — use TLS; enforce HTTPS-only endpoints" },
  { cat: "Security", q: "What is a CMK?", a: "CMK<span class='acr-full'>(Customer-Managed Key — encryption key controlled by the customer, not the cloud provider)</span>" },
  { cat: "Security", q: "What is key rotation?", a: "Periodically replacing encryption keys to limit the exposure window if a key is compromised" },
  { cat: "Security", q: "What is a WAF in cloud security?", a: "WAF<span class='acr-full'>(Web Application Firewall — inspects and filters HTTP/HTTPS traffic to protect against SQLi, XSS, and OWASP Top 10)</span>" },
  { cat: "Security", q: "What is a cloud DDoS protection service?", a: "Managed service absorbing volumetric attacks at the network edge<span class='acr-full'>(AWS Shield, Azure DDoS Protection, Google Cloud Armor)</span>" },
  { cat: "Security", q: "What is a private endpoint?", a: "A network interface that connects a cloud service to a VPC using a private IP — traffic never traverses the public internet" },
  { cat: "Security", q: "What is CSPM?", a: "CSPM<span class='acr-full'>(Cloud Security Posture Management — continuously assesses cloud configurations for misconfigurations and compliance violations)</span>" },
  { cat: "Security", q: "What is CWPP?", a: "CWPP<span class='acr-full'>(Cloud Workload Protection Platform — secures VMs, containers, and serverless functions against runtime threats)</span>" },
  { cat: "Security", q: "What is CNAPP?", a: "CNAPP<span class='acr-full'>(Cloud-Native Application Protection Platform — unified platform combining CSPM, CWPP, and shift-left security)</span>" },
  { cat: "Security", q: "What is a security baseline in the cloud?", a: "A minimum set of security configurations all cloud resources must meet — often based on CIS Benchmarks" },
  { cat: "Security", q: "What is an open S3 bucket and why is it dangerous?", a: "An object storage bucket with public read/write access — one of the most common cloud misconfigurations causing data breaches" },
  { cat: "Security", q: "What is cloud audit logging?", a: "Recording all API calls and user actions — AWS CloudTrail, Azure Activity Log, GCP Cloud Audit Logs — critical for forensics and compliance" },
  { cat: "Security", q: "What is secrets management?", a: "Securely storing and accessing credentials, API keys, and certificates — never hard-code secrets in code<span class='acr-full'>(AWS Secrets Manager, Azure Key Vault, HashiCorp Vault)</span>" },
  { cat: "Security", q: "What is a federated identity?", a: "Using an external identity provider (IdP) for authentication rather than creating separate cloud accounts<span class='acr-full'>(SAML, OIDC)</span>" },
  { cat: "Security", q: "What is tokenization in cloud data security?", a: "Replacing sensitive data with a non-sensitive token — the real data is stored in a separate secure vault" },

  // ========== DOMAIN 4: OPERATIONS (17%) ==========
  { cat: "Operations", q: "What is cloud monitoring?", a: "Collecting metrics, logs, and traces to observe the health and performance of cloud resources and applications" },
  { cat: "Operations", q: "What is an SLA?", a: "SLA<span class='acr-full'>(Service Level Agreement — contract between provider and customer defining uptime guarantees, support response times, and remedies for breach)</span>" },
  { cat: "Operations", q: "What is an SLO?", a: "SLO<span class='acr-full'>(Service Level Objective — internal target for availability or performance, typically more stringent than the SLA)</span>" },
  { cat: "Operations", q: "What is an SLI?", a: "SLI<span class='acr-full'>(Service Level Indicator — a specific measurable metric used to evaluate whether an SLO is being met, e.g., request latency, error rate)</span>" },
  { cat: "Operations", q: "What is an error budget?", a: "The allowed downtime or error rate within an SLO period — when exhausted, new feature deployments are paused to focus on reliability" },
  { cat: "Operations", q: "What are the three pillars of observability?", a: "Metrics (numeric measurements), Logs (discrete event records), Traces (end-to-end request paths)" },
  { cat: "Operations", q: "What is distributed tracing?", a: "Tracking a request as it flows through multiple microservices to identify latency and failure points" },
  { cat: "Operations", q: "What is cloud-native monitoring?", a: "AWS CloudWatch, Azure Monitor, Google Cloud Operations Suite — built-in telemetry collection and alerting" },
  { cat: "Operations", q: "What is configuration drift?", a: "When cloud resource configurations diverge from their defined baseline over time — detected and corrected with IaC and CSPM" },
  { cat: "Operations", q: "What is patch management in the cloud?", a: "Applying OS and software updates to cloud instances — automated via AWS Systems Manager, Azure Update Manager, or configuration management tools" },
  { cat: "Operations", q: "What is cloud cost management?", a: "Monitoring, analyzing, and optimizing cloud spending — tools: AWS Cost Explorer, Azure Cost Management, GCP Billing" },
  { cat: "Operations", q: "What is a reserved instance?", a: "A commitment to use a specific instance type for 1 or 3 years in exchange for significant discounts (up to 75%) over on-demand pricing" },
  { cat: "Operations", q: "What is a spot/preemptible instance?", a: "Spare cloud capacity offered at steep discounts — can be terminated by the provider with short notice, suitable for interruptible workloads" },
  { cat: "Operations", q: "What is rightsizing?", a: "Matching instance types and sizes to actual workload requirements to avoid over-provisioning and unnecessary cost" },
  { cat: "Operations", q: "What is a CMDB in cloud operations?", a: "CMDB<span class='acr-full'>(Configuration Management Database — tracks all cloud assets, their configurations, and relationships for change and incident management)</span>" },
  { cat: "Operations", q: "What is backup policy in the cloud?", a: "Defining frequency, retention, encryption, and cross-region replication requirements for backups — must align with RPO" },
  { cat: "Operations", q: "What is a snapshot?", a: "A point-in-time copy of a block storage volume — used for backups, creating images, and cloning volumes" },
  { cat: "Operations", q: "What is cross-region replication?", a: "Copying data to another region for disaster recovery and geographic redundancy" },

  // ========== DOMAIN 5: DEVOPS FUNDAMENTALS (10%) ==========
  { cat: "DevOps", q: "What is CI/CD?", a: "CI/CD<span class='acr-full'>(Continuous Integration / Continuous Deployment — automated pipelines that build, test, and deploy code on every commit)</span>" },
  { cat: "DevOps", q: "What is Continuous Integration?", a: "Automatically building and testing code every time a developer commits to the shared repository" },
  { cat: "DevOps", q: "What is Continuous Deployment?", a: "Automatically deploying every code change that passes tests to production without manual approval" },
  { cat: "DevOps", q: "What is Continuous Delivery?", a: "Similar to CD but requires a manual approval gate before deploying to production" },
  { cat: "DevOps", q: "What are CI/CD pipeline tools?", a: "Jenkins, GitHub Actions, GitLab CI, AWS CodePipeline, Azure DevOps<span class='acr-full'>(Each automates build, test, and deploy stages)</span>" },
  { cat: "DevOps", q: "What is GitOps?", a: "Using Git as the single source of truth for infrastructure and application configuration — changes are made via pull requests and automatically reconciled" },
  { cat: "DevOps", q: "What is a container registry?", a: "A repository for storing and distributing Docker container images<span class='acr-full'>(Docker Hub, AWS ECR, Azure Container Registry, GCR)</span>" },
  { cat: "DevOps", q: "What is image scanning?", a: "Analyzing container images for known CVEs before deployment — integrated into CI/CD pipelines as a security gate" },
  { cat: "DevOps", q: "What is shift-left security?", a: "Integrating security testing earlier in the development lifecycle — finding vulnerabilities in dev rather than after deployment" },
  { cat: "DevOps", q: "What is SAST?", a: "SAST<span class='acr-full'>(Static Application Security Testing — analyzes source code without executing it to find security vulnerabilities)</span>" },
  { cat: "DevOps", q: "What is DAST?", a: "DAST<span class='acr-full'>(Dynamic Application Security Testing — tests a running application by sending requests to find vulnerabilities)</span>" },
  { cat: "DevOps", q: "What is an artifact repository?", a: "A storage system for build outputs like compiled binaries, packages, and container images<span class='acr-full'>(Nexus, Artifactory, AWS CodeArtifact)</span>" },
  { cat: "DevOps", q: "What is Ansible used for in cloud?", a: "Configuration management and application deployment — agentless, uses SSH, YAML playbooks to configure cloud instances" },

  // ========== DOMAIN 6: TROUBLESHOOTING (12%) ==========
  { cat: "Troubleshooting", q: "A cloud instance has no internet connectivity — what do you check first?", a: "Internet gateway attached to VPC, public IP assigned, route table has 0.0.0.0/0 → IGW, security group allows outbound, NACL allows traffic" },
  { cat: "Troubleshooting", q: "Two instances in different subnets cannot communicate — what do you check?", a: "Route tables between subnets, security group inbound rules on the destination, NACL rules on both subnets" },
  { cat: "Troubleshooting", q: "A load balancer is returning 502/504 errors — what does this indicate?", a: "502 = bad gateway (backend returned invalid response). 504 = gateway timeout (backend didn't respond in time) — check instance health, app logs, and response times" },
  { cat: "Troubleshooting", q: "An application is slow during peak hours but fine otherwise — likely cause?", a: "Insufficient capacity — autoscaling may not be scaling fast enough or instance type is undersized; check CPU/memory metrics and scaling policies" },
  { cat: "Troubleshooting", q: "A deployment fails with a permissions error — what do you check?", a: "IAM role/policy attached to the deploying identity — verify it has required permissions for the target resource and region" },
  { cat: "Troubleshooting", q: "Cloud storage costs are unexpectedly high — what do you investigate?", a: "Unused snapshots, old object storage versions, wrong storage tier, data transfer/egress charges, orphaned volumes" },
  { cat: "Troubleshooting", q: "An instance fails health checks — what are the common causes?", a: "Application not running, wrong port in health check config, security group blocking health check source IP, disk full" },
  { cat: "Troubleshooting", q: "Autoscaling is not triggering despite high CPU — what do you check?", a: "Scaling policy thresholds, CloudWatch metric delays, cooldown period still active, max instance limit reached" },
  { cat: "Troubleshooting", q: "A TLS certificate error on a cloud endpoint — what do you check?", a: "Certificate expiry date, domain name mismatch, certificate not trusted by client (self-signed), SNI configuration" },
  { cat: "Troubleshooting", q: "DNS resolution fails for a new cloud resource — what do you check?", a: "DNS record created correctly, propagation time (wait up to 48 hours for public), private hosted zone associated with correct VPC" },

  { cat: "Troubleshooting", q: "What is a cloud troubleshooting methodology?", a: "Identify the problem → check metrics and logs → test the theory → implement fix → verify full functionality → document findings" },

  // ========== ADDITIONAL ARCHITECTURE ==========
  { cat: "Architecture", q: "What is a managed service?", a: "A cloud service where the provider handles underlying infrastructure, patching, and maintenance — e.g., RDS, DynamoDB, S3" },

  { cat: "Architecture", q: "What is a disaster recovery strategy for cloud?", a: "Backup and restore (cheapest/slowest), Pilot light (minimal standby), Warm standby (scaled-down live), Multi-site active/active (most expensive/fastest)" },

  { cat: "Deployment", q: "What is DNS in the cloud?", a: "Cloud-managed DNS service resolving domain names to resource IPs<span class='acr-full'>(AWS Route 53, Azure DNS, Google Cloud DNS)</span>" },
  { cat: "Deployment", q: "What is a site-to-site VPN in cloud?", a: "An IPSec encrypted tunnel connecting on-premises networks to a cloud VPC over the public internet" },

  { cat: "Deployment", q: "What is a Kubernetes namespace?", a: "A virtual cluster within a cluster — used to isolate resources between teams or environments" },

  { cat: "Deployment", q: "What is a managed Kubernetes service?", a: "Cloud-managed Kubernetes control plane — customer manages worker nodes<span class='acr-full'>(AWS EKS, Azure AKS, Google GKE)</span>" },

  { cat: "Security", q: "What is a cloud access review?", a: "Periodic review of IAM permissions to ensure least privilege — removes unused roles, over-privileged accounts, and stale access" },

  { cat: "Security", q: "What is a cloud security benchmark?", a: "A prescriptive set of configuration recommendations for cloud services<span class='acr-full'>(CIS AWS Foundations Benchmark, CIS Azure Benchmark)</span>" },
  { cat: "Security", q: "What is network segmentation in the cloud?", a: "Separating cloud resources into isolated network zones using VPCs, subnets, security groups, and NACLs to contain breaches" },
  { cat: "Security", q: "What is RBAC in cloud IAM?", a: "RBAC<span class='acr-full'>(Role-Based Access Control — permissions assigned to roles, roles assigned to users or services)</span>" },

  // ========== ADDITIONAL OPERATIONS ==========
  { cat: "Operations", q: "What is infrastructure drift detection?", a: "Identifying differences between the actual cloud state and the desired state defined in IaC — CSPM and IaC tools detect drift" },

];

let deck = [...CARDS];
let idx = 0;
let flipped = false;
let filter = "All";
let scores = {};

function getFiltered() {
  if (filter === "All") return [...CARDS];
  if (filter === "Missed") return CARDS.filter(c => scores[c.q] === "miss");
  if (filter === "Shaky") return CARDS.filter(c => scores[c.q] === "shaky");
  return CARDS.filter(c => c.cat === filter);
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function doShuffle() { deck = shuffle(getFiltered()); idx = 0; flipped = false; render(); }
function setFilter(f) { filter = f; deck = getFiltered(); idx = 0; flipped = false; render(); }
function flipCard() { flipped = !flipped; render(); }
function prev() { if (idx > 0) { idx--; flipped = false; render(); } }
function next() { if (idx < deck.length - 1) { idx++; flipped = false; render(); } }

function score(level) {
  if (deck.length === 0) return;
  scores[deck[idx].q] = level;
  if (idx < deck.length - 1) { idx++; flipped = false; }
  render();
}

function getStats() {
  let miss = 0, shaky = 0, got = 0, unseen = 0;
  CARDS.forEach(c => {
    const s = scores[c.q];
    if (s === "miss") miss++; else if (s === "shaky") shaky++; else if (s === "got") got++; else unseen++;
  });
  return { miss, shaky, got, unseen };
}

const cats = ["All", ...new Set(CARDS.map(c => c.cat)), "Missed", "Shaky"];

function render() {
  const app = document.getElementById("app");
  const stats = getStats();
  const total = deck.length;
  const progress = total > 0 ? ((idx + 1) / total * 100) : 0;
  const card = deck[idx];

  let catBtns = cats.map(c =>
    `<button class="cat-btn ${filter === c ? 'active' : ''}" onclick="setFilter('${c}')">${c}${c === "Missed" ? ` (${stats.miss})` : c === "Shaky" ? ` (${stats.shaky})` : ''}</button>`
  ).join('');

  let cardHTML = '';
  if (!card) {
    cardHTML = `<div class="empty-state"><p>No cards in this category yet.</p><p>Study more and mark cards to see them here!</p></div>`;
  } else {
    cardHTML = `
      <div class="card-container">
        <div class="card ${flipped ? 'flipped' : ''}" onclick="flipCard()">
          <div class="card-face card-front">
            <div class="card-cat">${card.cat}</div>
            <div class="card-question">${card.q}</div>
            <div class="card-hint">tap to reveal</div>
          </div>
          <div class="card-face card-back">
            <div class="card-cat">Answer</div>
            <div class="card-answer">${card.a}</div>
          </div>
        </div>
      </div>
      <div class="conf-row">
        <button class="conf-btn conf-miss" onclick="score('miss')">Missed</button>
        <button class="conf-btn conf-shaky" onclick="score('shaky')">Shaky</button>
        <button class="conf-btn conf-got" onclick="score('got')">Got it</button>
      </div>`;
  }

  app.innerHTML = `
    <h1>Cloud+ Flashcards</h1>
    <div class="subtitle">CV0-004 · ${CARDS.length} cards · one question, one answer</div>
    <div class="cat-bar">${catBtns}</div>
    ${total > 0 ? `
    <div class="filter-mode">${filter !== "All" && filter !== "Missed" && filter !== "Shaky" ? filter + ' · ' : ''}${idx + 1} of ${total}</div>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
      <div class="progress-text">${Math.round(progress)}%</div>
    </div>` : ''}
    ${cardHTML}
    ${card ? `
    <div class="nav-row">
      <button class="nav-btn" onclick="prev()" ${idx === 0 ? 'disabled' : ''}>← Prev</button>
      <button class="shuffle-btn" onclick="doShuffle()">Shuffle</button>
      <button class="nav-btn" onclick="next()" ${idx >= total - 1 ? 'disabled' : ''}>Next →</button>
    </div>` : ''}
    <div class="stats">
      <div class="stat stat-miss"><div class="stat-num">${stats.miss}</div><div class="stat-label">Missed</div></div>
      <div class="stat stat-shaky"><div class="stat-num">${stats.shaky}</div><div class="stat-label">Shaky</div></div>
      <div class="stat stat-got"><div class="stat-num">${stats.got}</div><div class="stat-label">Got It</div></div>
      <div class="stat stat-unseen"><div class="stat-num">${stats.unseen}</div><div class="stat-label">Unseen</div></div>
    </div>`;
}

doShuffle();
</script>
